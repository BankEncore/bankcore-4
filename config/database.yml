# PostgreSQL. Versions 9.5 and up are supported.
#
# Docker Compose (dev): set DATABASE_HOST=db, POSTGRES_USER, POSTGRES_PASSWORD.
# GitHub Actions (test): DATABASE_HOST=localhost (Postgres service).
#
default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("POSTGRES_USER") { "postgres" } %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD") { "postgres" } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("POSTGRES_PORT") { 5432 } %>

development:
  <<: *default
  database: bank_core4_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: bank_core4_test

production:
  primary: &primary_production
    <<: *default
    database: bank_core4_production
    username: bank_core4
    password: <%= ENV["BANK_CORE4_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: bank_core4_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: bank_core4_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: bank_core4_production_cable
    migrations_paths: db/cable_migrate
